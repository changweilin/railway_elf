<title>Railway Elf · 列車經過預測</title>
<meta name="description" content="預測台灣與日本鐵道任一地點的下一班列車到達時間 — Predict when the next train will pass any point on Taiwan and Japan rail lines." />
<meta name="theme-color" content="#0f1117" />
<script>
  (() => {
    try {
      const saved = localStorage.getItem('relf.theme');
      const theme = saved === 'dark' || saved === 'light'
        ? saved
        : (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    } catch {}
  })();
</script>
